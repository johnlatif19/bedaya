<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
  <title>لوحة التحكم | بداية</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          animation: {
            'fade-in': 'fadeIn 0.5s ease-out',
            'slide-up': 'slideUp 0.4s ease-out',
            'pulse-slow': 'pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite',
          },
          keyframes: {
            fadeIn: {
              '0%': { opacity: '0' },
              '100%': { opacity: '1' },
            },
            slideUp: {
              '0%': { opacity: '0', transform: 'translateY(20px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
          }
        }
      }
    }
  </script>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Cairo', 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      min-height: 100vh;
    }

    .dark body {
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
    }

    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    ::-webkit-scrollbar-track {
      background: #e2e8f0;
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb {
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      border-radius: 10px;
    }
    .dark ::-webkit-scrollbar-track {
      background: #1e293b;
    }

    .sidebar {
      transition: all 0.3s ease;
    }
    
    .sidebar-item {
      transition: all 0.2s ease;
      cursor: pointer;
    }
    
    .sidebar-item:hover {
      background: rgba(79, 70, 229, 0.1);
      transform: translateX(-5px);
    }
    
    .sidebar-item.active {
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      color: white;
    }
    
    .dark .sidebar-item.active {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
    }
    
    .sidebar-item i {
      width: 24px;
    }

    .stat-card {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .stat-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 20px 25px -12px rgba(0, 0, 0, 0.15);
    }

    .data-table tbody tr {
      transition: all 0.2s ease;
    }
    .data-table tbody tr:hover {
      background: rgba(79, 70, 229, 0.05);
    }
    .dark .data-table tbody tr:hover {
      background: rgba(79, 70, 229, 0.1);
    }

    .btn-action {
      transition: all 0.2s ease;
    }
    .btn-action:hover {
      transform: translateY(-2px);
    }

    .upload-zone {
      transition: all 0.3s ease;
      cursor: pointer;
    }
    .upload-zone:hover {
      border-color: #4f46e5;
      background: rgba(79, 70, 229, 0.05);
    }

    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(4px);
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s ease;
    }
    .loading-overlay.active {
      opacity: 1;
      visibility: visible;
    }
    .loading-spinner {
      width: 50px;
      height: 50px;
      border: 3px solid rgba(79, 70, 229, 0.3);
      border-radius: 50%;
      border-top-color: #4f46e5;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .toast-message {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 10000;
      animation: slideInRight 0.3s ease;
    }
    @keyframes slideInRight {
      from {
        transform: translateX(100%);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    .edit-modal {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(4px);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s ease;
    }
    .edit-modal.active {
      opacity: 1;
      visibility: visible;
    }
    .edit-modal-content {
      max-width: 500px;
      width: 90%;
      transform: scale(0.9);
      transition: all 0.3s ease;
    }
    .edit-modal.active .edit-modal-content {
      transform: scale(1);
    }

    .search-input:focus {
      transform: translateY(-2px);
    }

    .page-content {
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <!-- Loading Overlay -->
  <div id="loadingOverlay" class="loading-overlay">
    <div class="loading-spinner"></div>
  </div>

  <!-- Toast Container -->
  <div id="toastContainer" class="fixed bottom-4 right-4 z-50"></div>

  <!-- Edit Modal -->
  <div id="editModal" class="edit-modal">
    <div class="edit-modal-content bg-white dark:bg-gray-800 rounded-2xl shadow-2xl p-6">
      <h3 class="text-xl font-bold mb-4" id="editModalTitle">تعديل</h3>
      <div id="editModalBody"></div>
      <div class="flex gap-3 mt-6">
        <button id="saveEditBtn" class="flex-1 bg-green-500 text-white py-2 rounded-lg">حفظ</button>
        <button id="closeEditModal" class="flex-1 bg-gray-500 text-white py-2 rounded-lg">إلغاء</button>
      </div>
    </div>
  </div>

  <div class="flex h-screen overflow-hidden">
    <!-- ==================== SIDEBAR ==================== -->
    <aside class="sidebar w-72 bg-white dark:bg-gray-800 shadow-2xl flex flex-col overflow-y-auto z-20">
      <div class="p-6 border-b border-gray-200 dark:border-gray-700">
        <div class="flex items-center gap-3">
          <div class="w-12 h-12 bg-gradient-to-br from-indigo-500 to-purple-500 rounded-2xl flex items-center justify-center shadow-lg">
            <i class="fas fa-hand-sparkles text-white text-xl"></i>
          </div>
          <div>
            <h1 class="text-xl font-bold text-gray-800 dark:text-white">مركز بداية</h1>
            <p class="text-xs text-gray-500 dark:text-gray-400">لوحة التحكم</p>
          </div>
        </div>
      </div>
      
      <div class="flex-1 py-6">
        <div class="px-4 mb-4">
          <button id="sidebarDarkToggle" class="w-full flex items-center justify-between px-4 py-3 rounded-xl bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 transition-all">
            <span class="flex items-center gap-3">
              <i id="darkIcon" class="fas fa-moon text-gray-600 dark:text-gray-300"></i>
              <span>الوضع الداكن</span>
            </span>
            <i class="fas fa-toggle-off text-gray-500 dark:hidden"></i>
            <i class="fas fa-toggle-on text-indigo-500 hidden dark:inline"></i>
          </button>
        </div>
        
        <nav class="space-y-1 px-3">
          <div class="sidebar-item flex items-center gap-3 px-4 py-3 rounded-xl text-gray-700 dark:text-gray-300 hover:bg-indigo-50 dark:hover:bg-indigo-900/30 transition-all" data-page="dashboard">
            <i class="fas fa-chart-pie w-5"></i>
            <span>الرئيسية</span>
          </div>
          <div class="sidebar-item flex items-center gap-3 px-4 py-3 rounded-xl text-gray-700 dark:text-gray-300 hover:bg-indigo-50 dark:hover:bg-indigo-900/30 transition-all" data-page="sales">
            <i class="fas fa-chart-line w-5"></i>
            <span>المبيعات</span>
          </div>
          <div class="sidebar-item flex items-center gap-3 px-4 py-3 rounded-xl text-gray-700 dark:text-gray-300 hover:bg-indigo-50 dark:hover:bg-indigo-900/30 transition-all" data-page="users">
            <i class="fas fa-users w-5"></i>
            <span>المستخدمين</span>
          </div>
          <div class="sidebar-item flex items-center gap-3 px-4 py-3 rounded-xl text-gray-700 dark:text-gray-300 hover:bg-indigo-50 dark:hover:bg-indigo-900/30 transition-all" data-page="bookings">
            <i class="fas fa-calendar-check w-5"></i>
            <span>الحجوزات</span>
          </div>
          <div class="sidebar-item flex items-center gap-3 px-4 py-3 rounded-xl text-gray-700 dark:text-gray-300 hover:bg-indigo-50 dark:hover:bg-indigo-900/30 transition-all" data-page="results">
            <i class="fas fa-file-alt w-5"></i>
            <span>النتائج</span>
          </div>
          <div class="sidebar-item flex items-center gap-3 px-4 py-3 rounded-xl text-gray-700 dark:text-gray-300 hover:bg-indigo-50 dark:hover:bg-indigo-900/30 transition-all" data-page="messages">
            <i class="fas fa-envelope w-5"></i>
            <span>الرسائل</span>
          </div>
        </nav>
      </div>
      
      <div class="p-4 border-t border-gray-200 dark:border-gray-700">
        <button id="logoutBtnSidebar" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl bg-red-500 hover:bg-red-600 text-white transition-all">
          <i class="fas fa-sign-out-alt"></i>
          <span>تسجيل خروج</span>
        </button>
      </div>
    </aside>

    <!-- ==================== MAIN CONTENT ==================== -->
    <main class="flex-1 overflow-y-auto">
      <!-- Header -->
      <div class="bg-white/80 dark:bg-gray-800/80 backdrop-blur-md shadow-sm sticky top-0 z-10">
        <div class="px-6 py-4 flex justify-between items-center">
          <h2 id="pageTitle" class="text-2xl font-bold text-gray-800 dark:text-white">الرئيسية</h2>
          <div class="flex items-center gap-4">
            <div class="flex items-center gap-2">
              <i class="fas fa-user-circle text-2xl text-gray-500 dark:text-gray-400"></i>
              <span class="text-gray-700 dark:text-gray-300" id="adminName">أدمن</span>
            </div>
          </div>
        </div>
      </div>
      
      <div class="p-6" id="mainContent">
        <!-- الصفحات سيتم تحميلها ديناميكياً هنا -->
      </div>
    </main>
  </div>

  <script>
    // ==================== المتغيرات العامة ====================
    let currentPage = 'dashboard';
    let currentEditType = null;
    let currentEditId = null;
    let salesData = [];
    let usersData = [];
    let bookingsData = [];
    let resultsData = [];
    let messagesData = [];

    // ==================== دوال مساعدة ====================
    function showToast(message, type = 'success') {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = `toast-message bg-white dark:bg-gray-800 rounded-xl shadow-lg p-4 mb-3 flex items-center gap-3 border-r-4 ${type === 'success' ? 'border-green-500' : 'border-red-500'}`;
      toast.innerHTML = `
        <i class="fas ${type === 'success' ? 'fa-check-circle text-green-500' : 'fa-exclamation-circle text-red-500'} text-xl"></i>
        <span class="text-gray-700 dark:text-gray-300">${message}</span>
      `;
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    function showLoading() {
      document.getElementById('loadingOverlay').classList.add('active');
    }

    function hideLoading() {
      document.getElementById('loadingOverlay').classList.remove('active');
    }

    async function checkTokenValidity() {
      const token = localStorage.getItem('token');
      if (!token) {
        redirectToLogin();
        return false;
      }
      try {
        const res = await fetch('/api/admin/verify-token', {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        if (!res.ok) throw new Error();
        return true;
      } catch (error) {
        redirectToLogin();
        return false;
      }
    }

    function redirectToLogin() {
      localStorage.removeItem('token');
      window.location.href = '/login';
    }

    // ==================== تحميل البيانات ====================
    async function loadSales() {
      const isValid = await checkTokenValidity();
      if (!isValid) return;
      try {
        const res = await fetch('/api/admin/sales/today', {
          headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
        });
        if (!res.ok) throw new Error();
        const { sales, todayTotal } = await res.json();
        salesData = sales;
        return { sales, todayTotal };
      } catch (error) {
        console.error('Error loading sales:', error);
        return { sales: [], todayTotal: 0 };
      }
    }

    async function loadUsers() {
      const isValid = await checkTokenValidity();
      if (!isValid) return [];
      try {
        const res = await fetch('/api/admin/users', {
          headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
        });
        if (!res.ok) throw new Error();
        usersData = await res.json();
        return usersData;
      } catch (error) {
        console.error('Error loading users:', error);
        return [];
      }
    }

    async function loadBookings() {
      const isValid = await checkTokenValidity();
      if (!isValid) return [];
      try {
        const res = await fetch('/api/admin/bookings', {
          headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
        });
        if (!res.ok) throw new Error();
        bookingsData = await res.json();
        return bookingsData;
      } catch (error) {
        console.error('Error loading bookings:', error);
        return [];
      }
    }

    async function loadResults() {
      const isValid = await checkTokenValidity();
      if (!isValid) return [];
      try {
        const res = await fetch('/api/admin/results', {
          headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
        });
        if (!res.ok) throw new Error();
        resultsData = await res.json();
        return resultsData;
      } catch (error) {
        console.error('Error loading results:', error);
        return [];
      }
    }

    async function loadMessages() {
      const isValid = await checkTokenValidity();
      if (!isValid) return [];
      try {
        const res = await fetch('/api/admin/messages', {
          headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
        });
        if (!res.ok) throw new Error();
        messagesData = await res.json();
        return messagesData;
      } catch (error) {
        console.error('Error loading messages:', error);
        return [];
      }
    }

    // ==================== دوال العرض ====================
    function renderDashboardPage(salesTodayTotal, usersCount, bookingsCount, resultsCount) {
      return `
        <div class="page-content">
          <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
            <div class="stat-card bg-white dark:bg-gray-800 rounded-2xl p-6 shadow-lg">
              <div class="flex items-center justify-between">
                <div>
                  <p class="text-gray-500 dark:text-gray-400 text-sm">إجمالي المبيعات اليوم</p>
                  <p class="text-3xl font-bold text-gray-800 dark:text-white mt-2">${salesTodayTotal} <span class="text-sm">ج.م</span></p>
                </div>
                <div class="w-12 h-12 bg-green-100 dark:bg-green-900/50 rounded-full flex items-center justify-center">
                  <i class="fas fa-chart-line text-green-600 text-xl"></i>
                </div>
              </div>
            </div>
            <div class="stat-card bg-white dark:bg-gray-800 rounded-2xl p-6 shadow-lg">
              <div class="flex items-center justify-between">
                <div>
                  <p class="text-gray-500 dark:text-gray-400 text-sm">عدد المستخدمين</p>
                  <p class="text-3xl font-bold text-gray-800 dark:text-white mt-2">${usersCount}</p>
                </div>
                <div class="w-12 h-12 bg-blue-100 dark:bg-blue-900/50 rounded-full flex items-center justify-center">
                  <i class="fas fa-users text-blue-600 text-xl"></i>
                </div>
              </div>
            </div>
            <div class="stat-card bg-white dark:bg-gray-800 rounded-2xl p-6 shadow-lg">
              <div class="flex items-center justify-between">
                <div>
                  <p class="text-gray-500 dark:text-gray-400 text-sm">عدد الحجوزات</p>
                  <p class="text-3xl font-bold text-gray-800 dark:text-white mt-2">${bookingsCount}</p>
                </div>
                <div class="w-12 h-12 bg-purple-100 dark:bg-purple-900/50 rounded-full flex items-center justify-center">
                  <i class="fas fa-calendar-check text-purple-600 text-xl"></i>
                </div>
              </div>
            </div>
            <div class="stat-card bg-white dark:bg-gray-800 rounded-2xl p-6 shadow-lg">
              <div class="flex items-center justify-between">
                <div>
                  <p class="text-gray-500 dark:text-gray-400 text-sm">النتائج المرفوعة</p>
                  <p class="text-3xl font-bold text-gray-800 dark:text-white mt-2">${resultsCount}</p>
                </div>
                <div class="w-12 h-12 bg-orange-100 dark:bg-orange-900/50 rounded-full flex items-center justify-center">
                  <i class="fas fa-file-alt text-orange-600 text-xl"></i>
                </div>
              </div>
            </div>
          </div>
          <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-lg p-6">
            <h3 class="text-lg font-bold mb-4">مرحباً بك في لوحة التحكم</h3>
            <p class="text-gray-600 dark:text-gray-400">يمكنك التنقل بين الأقسام من القائمة الجانبية لإدارة المبيعات والمستخدمين والحجوزات والنتائج والرسائل.</p>
          </div>
        </div>
      `;
    }

    function renderSalesPage() {
      return `
        <div class="page-content">
          <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-lg overflow-hidden">
            <div class="border-b border-gray-200 dark:border-gray-700 px-6 py-4">
              <h2 class="text-xl font-bold text-gray-800 dark:text-white">
                <i class="fas fa-chart-simple ml-2 text-indigo-500"></i> نظام المبيعات
              </h2>
            </div>
            <div class="p-6">
              <form id="salesForm" class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                <input type="text" id="customerName" placeholder="اسم العميل" class="px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-xl bg-gray-50 dark:bg-gray-700 focus:ring-2 focus:ring-indigo-500 transition-all" required />
                <input type="number" id="saleAmount" placeholder="المبلغ (ج.م)" class="px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-xl bg-gray-50 dark:bg-gray-700 focus:ring-2 focus:ring-indigo-500 transition-all" required />
                <button type="submit" class="bg-gradient-to-r from-indigo-500 to-purple-500 text-white py-3 rounded-xl font-semibold transition-all hover:scale-105">
                  <i class="fas fa-plus ml-2"></i> تسجيل بيع
                </button>
              </form>
              
              <div class="flex justify-between items-center mb-4">
                <button id="viewSalesBtn" class="px-4 py-2 bg-green-500 text-white rounded-lg transition-all hover:bg-green-600">
                  <i class="fas fa-list ml-2"></i> عرض سجلات المبيعات
                </button>
                <input type="text" id="searchSales" placeholder="بحث في المبيعات..." class="px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg w-64 search-input" />
              </div>
              
              <div class="overflow-x-auto">
                <table id="salesTable" class="data-table w-full hidden">
                  <thead class="bg-indigo-50 dark:bg-indigo-900/30">
                    <tr>
                      <th class="px-4 py-3 text-right">اسم العميل</th>
                      <th class="px-4 py-3 text-right">المبلغ</th>
                      <th class="px-4 py-3 text-right">وقت البيع</th>
                      <th class="px-4 py-3 text-right">الإجراءات</th>
                    </tr>
                  </thead>
                  <tbody></tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function renderUsersPage() {
      return `
        <div class="page-content">
          <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-lg overflow-hidden">
            <div class="border-b border-gray-200 dark:border-gray-700 px-6 py-4">
              <h2 class="text-xl font-bold text-gray-800 dark:text-white">
                <i class="fas fa-users ml-2 text-blue-500"></i> المستخدمين
              </h2>
            </div>
            <div class="p-6">
              <input type="text" id="searchUsers" placeholder="بحث في المستخدمين..." class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg mb-4 search-input" />
              <div class="overflow-x-auto max-h-[500px] overflow-y-auto">
                <table id="usersTable" class="data-table w-full">
                  <thead class="bg-blue-50 dark:bg-blue-900/30 sticky top-0">
                    <tr>
                      <th class="px-3 py-2 text-right">الاسم</th>
                      <th class="px-3 py-2 text-right">البريد</th>
                      <th class="px-3 py-2 text-right">الهاتف</th>
                      <th class="px-3 py-2 text-right">الرسائل</th>
                      <th class="px-3 py-2 text-right">الإجراءات</th>
                    </tr>
                  </thead>
                  <tbody></tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function renderBookingsPage() {
      return `
        <div class="page-content">
          <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-lg overflow-hidden">
            <div class="border-b border-gray-200 dark:border-gray-700 px-6 py-4">
              <h2 class="text-xl font-bold text-gray-800 dark:text-white">
                <i class="fas fa-calendar-check ml-2 text-purple-500"></i> الحجوزات
              </h2>
            </div>
            <div class="p-6">
              <input type="text" id="searchBookings" placeholder="بحث في الحجوزات..." class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg mb-4 search-input" />
              <div class="overflow-x-auto max-h-[500px] overflow-y-auto">
                <table id="bookingsTable" class="data-table w-full">
                  <thead class="bg-purple-50 dark:bg-purple-900/30 sticky top-0">

    // ==================== تحديث الصفحة الحالية ====================
    async function refreshCurrentPage() {
      await loadAllData();
      
      if (currentPage === 'dashboard') {
        const salesResult = await loadSales();
        document.getElementById('mainContent').innerHTML = renderDashboardPage(
          salesResult.todayTotal, 
          usersData.length, 
          bookingsData.length, 
          resultsData.length
        );
      } else if (currentPage === 'sales') {
        document.getElementById('mainContent').innerHTML = renderSalesPage();
        await loadSales();
        renderSalesTable(salesData);
        attachSalesEvents();
      } else if (currentPage === 'users') {
        document.getElementById('mainContent').innerHTML = renderUsersPage();
        renderUsersTable();
        attachUsersEvents();
      } else if (currentPage === 'bookings') {
        document.getElementById('mainContent').innerHTML = renderBookingsPage();
        renderBookingsTable();
        attachBookingsEvents();
      } else if (currentPage === 'results') {
        document.getElementById('mainContent').innerHTML = renderResultsPage();
        renderResultsTable();
        attachResultsEvents();
      } else if (currentPage === 'messages') {
        document.getElementById('mainContent').innerHTML = renderMessagesPage();
        renderMessagesTable();
        attachMessagesEvents();
      }
    }

    async function loadAllData() {
      await Promise.all([
        loadSales(),
        loadUsers(),
        loadBookings(),
        loadResults(),
        loadMessages()
      ]);
    }

    // ==================== إرفاق الأحداث ====================
    function attachSalesEvents() {
      const salesForm = document.getElementById('salesForm');
      if (salesForm) {
        salesForm.addEventListener('submit', async (e) => {
          e.preventDefault();
          const customerName = document.getElementById('customerName').value.trim();
          const amount = document.getElementById('saleAmount').value.trim();
          if (!customerName || !amount) {
            showToast('يرجى إدخال جميع البيانات', 'error');
            return;
          }
          showLoading();
          try {
            const res = await fetch('/api/admin/sales', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${localStorage.getItem('token')}`
              },
              body: JSON.stringify({ customerName, amount: parseFloat(amount) })
            });
            const data = await res.json();
            if (res.ok) {
              showToast(data.message);
              document.getElementById('salesForm').reset();
              await refreshCurrentPage();
            } else {
              showToast(data.error || 'حدث خطأ', 'error');
            }
          } catch (error) {
            showToast('خطأ في الاتصال', 'error');
          }
          hideLoading();
        });
      }

      const viewSalesBtn = document.getElementById('viewSalesBtn');
      let salesTableVisible = false;
      if (viewSalesBtn) {
        viewSalesBtn.addEventListener('click', () => {
          const table = document.getElementById('salesTable');
          salesTableVisible = !salesTableVisible;
          table.style.display = salesTableVisible ? 'table' : 'none';
          viewSalesBtn.innerHTML = salesTableVisible ? '<i class="fas fa-eye-slash ml-2"></i> إخفاء السجلات' : '<i class="fas fa-list ml-2"></i> عرض سجلات المبيعات';
        });
      }

      const searchSales = document.getElementById('searchSales');
      if (searchSales) {
        searchSales.addEventListener('input', (e) => {
          const term = e.target.value.toLowerCase();
          const filtered = salesData.filter(s => s.customerName.toLowerCase().includes(term));
          renderSalesTable(filtered);
        });
      }
    }

            const tr = document.createElement('tr');
            tr.innerHTML = `
              <td class="px-4 py-3 border-b border-gray-200 dark:border-gray-700">${result.phone}</td>
              <td class="px-4 py-3 border-b border-gray-200 dark:border-gray-700">
                <a href="${result.fileUrl}" target="_blank" class="text-indigo-500 hover:underline">
                  <i class="fas fa-eye ml-1"></i> عرض
                </a>
              </td>
              <td class="px-4 py-3 border-b border-gray-200 dark:border-gray-700">${new Date(result.uploadedAt).toLocaleString('ar-EG')}</td>
              <td class="px-4 py-3 border-b border-gray-200 dark:border-gray-700">
                <button class="bg-yellow-500 text-white px-3 py-1 rounded-lg text-sm ml-2" onclick="editResult('${encodeURIComponent(result.phone)}')">
                  <i class="fas fa-edit"></i>
                </button>
                <button class="bg-red-500 text-white px-3 py-1 rounded-lg text-sm" onclick="deleteResult('${encodeURIComponent(result.phone)}')">
                  <i class="fas fa-trash"></i>
                </button>
              </td>
            `;
            tbody.appendChild(tr);
          });
        });
      }
    }

    function attachMessagesEvents() {
      const messageForm = document.getElementById('messageForm');
      if (messageForm) {
        messageForm.addEventListener('submit', async (e) => {
          e.preventDefault();
          const email = document.getElementById('emailInput').value.trim();
          const message = document.getElementById('messageInput').value.trim();
          if (!email || !message) {
            showToast('يرجى إدخال البريد الإلكتروني والرسالة', 'error');
            return;
          }
          showLoading();
          try {
            const res = await fetch('/api/admin/message', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${localStorage.getItem('token')}`
              },
              body: JSON.stringify({ email, message })
            });
            const data = await res.json();
            if (res.ok) {
              showToast(data.message);
              document.getElementById('messageForm').reset();
              await refreshCurrentPage();
            } else {
              showToast(data.error || 'حدث خطأ', 'error');
            }
          } catch (error) {
            showToast('خطأ في الاتصال', 'error');
          }
          hideLoading();
        });
      }
    }

    // ==================== تبديل الصفحات ====================
    async function switchToPage(page) {
      currentPage = page;
      
      // تحديث الـ active في القائمة
      document.querySelectorAll('.sidebar-item').forEach(item => {
        if (item.dataset.page === page) {
          item.classList.add('active');
        } else {
          item.classList.remove('active');
        }
      });
      
      // تحديث عنوان الصفحة
      const titles = {
        dashboard: 'الرئيسية',
        sales: 'المبيعات',
        users: 'المستخدمين',
        bookings: 'الحجوزات',
        results: 'النتائج',
        messages: 'الرسائل'
      };
      document.getElementById('pageTitle').textContent = titles[page] || 'لوحة التحكم';
      
      showLoading();
      
      await loadAllData();
      
      if (page === 'dashboard') {
        const salesResult = await loadSales();
        document.getElementById('mainContent').innerHTML = renderDashboardPage(
          salesResult.todayTotal, 
          usersData.length, 
          bookingsData.length, 
          resultsData.length
        );
      } else if (page === 'sales') {
        document.getElementById('mainContent').innerHTML = renderSalesPage();
        renderSalesTable(salesData);
        attachSalesEvents();
      } else if (page === 'users') {
        document.getElementById('mainContent').innerHTML = renderUsersPage();
        renderUsersTable();
        attachUsersEvents();
      } else if (page === 'bookings') {
        document.getElementById('mainContent').innerHTML = renderBookingsPage();
        renderBookingsTable();
        attachBookingsEvents();
      } else if (page === 'results') {
        document.getElementById('mainContent').innerHTML = renderResultsPage();
        renderResultsTable();
        attachResultsEvents();
      } else if (page === 'messages') {
        document.getElementById('mainContent').innerHTML = renderMessagesPage();
        renderMessagesTable();
        attachMessagesEvents();
      }
      
      hideLoading();
    }

    // ==================== حفظ التعديل ====================
    document.getElementById('saveEditBtn').addEventListener('click', async () => {
      if (currentEditType === 'sale') {
        const newName = document.getElementById('editName').value.trim();
        const newAmount = document.getElementById('editAmount').value.trim();
        if (!newName || !newAmount) {
          showToast('يرجى إدخال جميع البيانات', 'error');
          return;
        }
        showLoading();
        try {
          const res = await fetch(`/api/admin/sale/${currentEditId}`, {
            method: 'PUT',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${localStorage.getItem('token')}`
            },
            body: JSON.stringify({ customerName: newName, amount: parseFloat(newAmount) })
          });
          const data = await res.json();
          if (res.ok) {
            showToast(data.message);
            await refreshCurrentPage();
            document.getElementById('editModal').classList.remove('active');
          } else {
            showToast(data.error || 'حدث خطأ', 'error');
          }
        } catch (error) {
          showToast('خطأ في الاتصال', 'error');
        }
        hideLoading();
      } else if (currentEditType === 'result') {
        const newPhone = document.getElementById('editPhone').value.trim();
        const file = document.getElementById('editFile').files[0];
        if (!newPhone) {
          showToast('يرجى إدخال رقم الهاتف', 'error');
          return;
        }
        showLoading();
        const formData = new FormData();
        formData.append('phone', newPhone);
        if (file) formData.append('resultFile', file);
        try {
          const res = await fetch(`/api/admin/result/${encodeURIComponent(currentEditId)}`, {
            method: 'PUT',
            headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` },
            body: formData
          });
          const data = await res.json();
          if (res.ok) {
            showToast(data.message);
            await refreshCurrentPage();
            document.getElementById('editModal').classList.remove('active');
          } else {
            showToast(data.error || 'حدث خطأ', 'error');
          }
        } catch (error) {
          showToast('خطأ في الاتصال', 'error');
        }
        hideLoading();
      }
    });

    document.getElementById('closeEditModal').addEventListener('click', () => {
      document.getElementById('editModal').classList.remove('active');
    });

    // ==================== تسجيل الخروج ====================
    async function logout() {
      if (!confirm('هل أنت متأكد من تسجيل الخروج؟')) return;
      try {
        await fetch('/api/admin/logout', {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
        });
      } catch (error) {}
      localStorage.removeItem('token');
      window.location.href = '/login';
    }
    
    document.getElementById('logoutBtnSidebar').addEventListener('click', logout);

    // ==================== الوضع الداكن ====================
    function initDarkMode() {
      const sidebarDarkToggle = document.getElementById('sidebarDarkToggle');
      const darkIcon = document.getElementById('darkIcon');
      
      if (localStorage.getItem('adminDarkMode') === 'true') {
        document.documentElement.classList.add('dark');
        if (darkIcon) {
          darkIcon.classList.remove('fa-moon');
          darkIcon.classList.add('fa-sun');
        }
      }
      
      if (sidebarDarkToggle) {
        sidebarDarkToggle.addEventListener('click', () => {
          document.documentElement.classList.toggle('dark');
          const isDark = document.documentElement.classList.contains('dark');
          localStorage.setItem('adminDarkMode', isDark);
          if (darkIcon) {
            if (isDark) {
              darkIcon.classList.remove('fa-moon');
              darkIcon.classList.add('fa-sun');
            } else {
              darkIcon.classList.remove('fa-sun');
              darkIcon.classList.add('fa-moon');
            }
          }
        });
      }
    }

    // ==================== التحميل الأولي ====================
    document.addEventListener('DOMContentLoaded', async () => {
      const isValid = await checkTokenValidity();
      if (!isValid) return;
      
      initDarkMode();
      
      // إضافة مستمعي الأحداث للقائمة
      document.querySelectorAll('.sidebar-item').forEach(item => {
        item.addEventListener('click', () => {
          switchToPage(item.dataset.page);
        });
      });
      
      await switchToPage('dashboard');
    });
  </script>
</body>
</html>
