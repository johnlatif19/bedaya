<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تسجيل دخول الأدمن | بداية</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Poppins:wght@100&family=Reem+Kufi+Fun:wght@400;500;600;700&display=swap");

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Reem Kufi Fun", sans-serif;
    }

    :root {
      --primaryColor: #4f46e5;
      --primaryHover: #6366f1;
      --secondColor: #e2e8f0;
      --backgroundColor: #f1f5f9;
      --textColor: #1e293b;
      --cardBg: #ffffff;
      --borderColor: #e2e8f0;
    }

    body.dark-mode {
      --primaryColor: #818cf8;
      --primaryHover: #a5b4fc;
      --secondColor: #1e293b;
      --backgroundColor: #0f172a;
      --textColor: #f1f5f9;
      --cardBg: #1e293b;
      --borderColor: #334155;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: linear-gradient(135deg, var(--backgroundColor) 0%, var(--secondColor) 100%);
      color: var(--textColor);
      transition: background-color 0.3s ease, color 0.3s ease;
      direction: rtl;
      padding: 20px;
    }

    /* Animated Border Box */
    .box {
      position: relative;
      width: 420px;
      background: var(--cardBg);
      transition: 0.5s cubic-bezier(0.445, 0.05, 0.55, 0.95);
      box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.25);
      border-radius: 24px;
      overflow: hidden;
    }

    .box::before,
    .box::after {
      content: "";
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: linear-gradient(0deg, transparent, var(--primaryColor), var(--primaryColor));
      transform-origin: bottom right;
      animation: animate 6s linear infinite;
    }

    .box::after {
      animation-delay: -3s;
    }

    @keyframes animate {
      0% {
        transform: rotate(0deg);
      }
      100% {
        transform: rotate(360deg);
      }
    }

    .form {
      position: relative;
      margin: 3px;
      border-radius: 24px;
      background: var(--cardBg);
      z-index: 10;
      padding: 40px 35px;
      display: flex;
      flex-direction: column;
    }

    .form h2 {
      color: var(--primaryColor);
      font-weight: 700;
      text-align: center;
      letter-spacing: -0.02em;
      margin-bottom: 30px;
      font-size: 28px;
    }

    .inputBox {
      position: relative;
      width: 100%;
      margin-top: 25px;
    }

    .inputBox input {
      position: relative;
      width: 100%;
      padding: 12px 0 12px 0;
      background: transparent;
      border: none;
      border-bottom: 2px solid var(--borderColor);
      outline: none;
      color: var(--textColor);
      font-size: 1em;
      letter-spacing: 0.05em;
      z-index: 10;
      transition: all 0.3s ease;
    }

    .inputBox input:focus {
      border-bottom-color: var(--primaryColor);
    }

    .inputBox label {
      position: absolute;
      top: 50%;
      right: 0;
      color: var(--textColor);
      transform: translateY(-50%);
      pointer-events: none;
      font-size: 1em;
      letter-spacing: 0.05em;
      transition: 0.3s ease;
      opacity: 0.7;
    }

    .inputBox input:focus~label,
    .inputBox input:valid~label {
      top: -5px;
      font-size: 0.75em;
      color: var(--primaryColor);
      opacity: 1;
    }

    .button {
      margin-top: 40px;
      width: 100%;
    }

    .button button {
      width: 100%;
      padding: 12px 0;
      background-color: var(--primaryColor);
      color: white;
      font-weight: 600;
      font-size: 1.1em;
      border-radius: 50px;
      cursor: pointer;
      border: none;
      transition: all 0.3s ease;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }

    .button button:hover {
      background-color: var(--primaryHover);
      transform: translateY(-2px);
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
    }

    .button button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }

    .toggle-password {
      margin-top: 15px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .toggle-password input {
      width: 18px;
      height: 18px;
      cursor: pointer;
      accent-color: var(--primaryColor);
    }

    .toggle-password label {
      cursor: pointer;
      font-size: 0.85em;
      color: var(--textColor);
      opacity: 0.8;
    }

    .error {
      margin-top: 20px;
      color: #ef4444;
      font-weight: 500;
      text-align: center;
      font-size: 0.9em;
      padding: 8px;
      background: rgba(239, 68, 68, 0.1);
      border-radius: 12px;
    }

    .darkModeToggle {
      position: fixed;
      bottom: 20px;
      left: 20px;
      background-color: var(--cardBg);
      color: var(--primaryColor);
      border: 1px solid var(--borderColor);
      padding: 12px 14px;
      border-radius: 50px;
      cursor: pointer;
      font-size: 1.2em;
      transition: all 0.3s ease;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      z-index: 1000;
    }

    .darkModeToggle:hover {
      transform: scale(1.05);
      background-color: var(--primaryColor);
      color: white;
    }

    .loading {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 0.8s ease-in-out infinite;
      margin-left: 10px;
      vertical-align: middle;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* Animation on scroll classes */
    .animate-on-scroll {
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .animate-on-scroll.animated {
      opacity: 1;
      transform: translateY(0);
    }

    @media (prefers-reduced-motion: reduce) {
      .animate-on-scroll {
        transition: none;
        opacity: 1;
        transform: none;
      }
    }
  </style>
</head>

<body>
  <div class="box animate-on-scroll">
    <form id="loginForm" class="form" autocomplete="off">
      <h2>🔐 تسجيل الدخول</h2>
      
      <div class="inputBox">
        <input type="text" id="username" name="username" required autocomplete="off" />
        <label for="username">اسم المستخدم</label>
      </div>

      <div class="inputBox">
        <input type="password" id="password" name="password" required autocomplete="off" />
        <label for="password">كلمة المرور</label>
      </div>

      <div class="toggle-password">
        <input type="checkbox" id="showPassword">
        <label for="showPassword">إظهار كلمة المرور</label>
      </div>

      <div class="button">
        <button type="submit" id="submitBtn">دخول</button>
      </div>
      
      <div class="error" id="errorMsg"></div>
    </form>
  </div>

  <button id="darkModeToggle" class="darkModeToggle">🌙</button>

  <script>
    // ==================== ANIMATION ON SCROLL ====================
    const animateElements = document.querySelectorAll('.animate-on-scroll');
    
    const observerOptions = {
      threshold: 0.1,
      rootMargin: '0px 0px -20px 0px'
    };
    
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('animated');
          observer.unobserve(entry.target);
        }
      });
    }, observerOptions);
    
    animateElements.forEach(element => {
      observer.observe(element);
    });
    
    // ==================== CHECK EXISTING TOKEN ====================
    if (localStorage.getItem('token')) {
      // التحقق من صحة التوكن قبل التوجيه
      fetch('/api/admin/verify-token', {
        headers: {
          'Authorization': `Bearer ${localStorage.getItem('token')}`
        }
      }).then(res => {
        if (res.ok) {
          window.location.href = '/dashboard';
        } else {
          localStorage.removeItem('token');
        }
      }).catch(() => {
        localStorage.removeItem('token');
      });
    }
    
    // ==================== DARK MODE ====================
    const darkModeToggle = document.getElementById('darkModeToggle');
    
    // تطبيق الوضع المحفوظ
    if (localStorage.getItem('darkMode') === 'true') {
      document.body.classList.add('dark-mode');
      darkModeToggle.textContent = '☀️';
    }
    
    darkModeToggle.addEventListener('click', () => {
      document.body.classList.toggle('dark-mode');
      const isDark = document.body.classList.contains('dark-mode');
      darkModeToggle.textContent = isDark ? '☀️' : '🌙';
      localStorage.setItem('darkMode', isDark);
    });
    
    // ==================== SHOW/HIDE PASSWORD ====================
    const showPasswordCheckbox = document.getElementById('showPassword');
    const passwordInput = document.getElementById('password');
    
    showPasswordCheckbox.addEventListener('change', function() {
      passwordInput.type = this.checked ? 'text' : 'password';
    });
    
    // ==================== LOGIN FORM HANDLER ====================
    const loginForm = document.getElementById('loginForm');
    const errorMsg = document.getElementById('errorMsg');
    const submitBtn = document.getElementById('submitBtn');
    
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      // تعطيل الزر وإظهار حالة التحميل
      submitBtn.disabled = true;
      const originalBtnText = submitBtn.innerHTML;
      submitBtn.innerHTML = 'جاري التسجيل <span class="loading"></span>';
      errorMsg.textContent = '';
      
      const data = {
        username: document.getElementById('username').value.trim(),
        password: document.getElementById('password').value.trim()
      };
      
      // التحقق من إدخال البيانات
      if (!data.username || !data.password) {
        errorMsg.textContent = '❌ يرجى إدخال اسم المستخدم وكلمة المرور';
        submitBtn.disabled = false;
        submitBtn.innerHTML = originalBtnText;
        return;
      }
      
      try {
        const res = await fetch('/api/admin/login', {
          method: 'POST',
          headers: { 
            'Content-Type': 'application/json',
            'Accept': 'application/json'
          },
          body: JSON.stringify(data)
        });
        
        const result = await res.json();
        
        if (res.ok && result.token) {
          // حفظ التوكن
          localStorage.setItem('token', result.token);
          
          // التحقق من صحة التوكن قبل التوجيه
          const authCheck = await fetch('/api/admin/verify-token', {
            headers: {
              'Authorization': `Bearer ${result.token}`
            }
          });
          
          if (authCheck.ok) {
            // إضافة تأثير بسيط قبل التوجيه
            document.querySelector('.box').style.transform = 'scale(0.95)';
            setTimeout(() => {
              window.location.href = '/dashboard';
            }, 200);
          } else {
            errorMsg.textContent = '❌ فشل التحقق من الصلاحية';
            localStorage.removeItem('token');
          }
        } else {
          errorMsg.textContent = result.error || '❌ اسم المستخدم أو كلمة المرور غير صحيحة';
        }
      } catch (err) {
        console.error('Login error:', err);
        errorMsg.textContent = '⚠️ تعذر الاتصال بالخادم. يرجى المحاولة لاحقاً';
      } finally {
        submitBtn.disabled = false;
        submitBtn.innerHTML = originalBtnText;
      }
    });
    
    // ==================== ADDITIONAL SECURITY ====================
    // منع النقر بزر الماوس الأيمن على الصفحة
    document.addEventListener("contextmenu", function(e) {
      e.preventDefault();
    });
    
    // منع بعض مفاتيح المطورين
    document.addEventListener("keydown", function(e) {
      if (e.keyCode === 123 || 
          (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74 || e.keyCode === 67)) || 
          (e.ctrlKey && e.keyCode === 85)) {
        e.preventDefault();
        return false;
      }
    });
  </script>
</body>
</html>
