<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل دخول الإدارة | بداية</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .login-card {
      background: rgba(255,255,255,0.95);
      border-radius: 40px;
      padding: 40px;
      width: 100%;
      max-width: 450px;
      box-shadow: 0 25px 45px rgba(0,0,0,0.2);
      backdrop-filter: blur(10px);
      transition: 0.3s;
      text-align: center;
    }
    .dark-mode .login-card {
      background: rgba(30,30,45,0.95);
      color: white;
    }
    .logo {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      margin-bottom: 20px;
      border: 3px solid #667eea;
      box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    }
    input {
      width: 100%;
      padding: 15px 20px;
      margin: 12px 0;
      border: none;
      background: #f1f5f9;
      border-radius: 60px;
      font-size: 1rem;
      outline: none;
      transition: 0.2s;
    }
    .dark-mode input {
      background: #2d2d44;
      color: white;
    }
    input:focus {
      box-shadow: 0 0 0 3px rgba(102,126,234,0.5);
    }
    button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(90deg, #667eea, #764ba2);
      color: white;
      border: none;
      border-radius: 60px;
      font-size: 1.2rem;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.2s;
    }
    button:hover { transform: scale(1.02); }
    .toggle-pwd {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 10px 0;
      justify-content: flex-start;
    }
    .error-msg { color: #ef4444; margin-top: 15px; font-weight: 500; }
    .theme-switch {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: white;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
      font-size: 1.5rem;
    }
    .dark-mode .theme-switch { background: #333; color: white; }
    body.dark-mode { background: linear-gradient(135deg, #1e1b4b, #2e1065); }
  </style>
</head>
<body>
  <div class="login-card">
    <img src="https://i.postimg.cc/PqYGJKTd/Logo.jpg" alt="شعار بداية" class="logo">
    <h1 style="margin-bottom: 20px;">مرحباً بك 👋</h1>
    <form id="adminLoginForm">
      <input type="text" id="username" placeholder="اسم المستخدم" autocomplete="off" required>
      <input type="password" id="password" placeholder="كلمة المرور" required>
      <div class="toggle-pwd">
        <input type="checkbox" id="showPass"> <label for="showPass">إظهار كلمة المرور</label>
      </div>
      <button type="submit" id="loginBtn">دخول <i class="fas fa-arrow-left"></i></button>
      <div id="loginError" class="error-msg"></div>
    </form>
  </div>
  <div class="theme-switch" id="darkModeToggle">🌙</div>

  <script>
    // Dark mode
    if (localStorage.getItem('adminDarkMode') === 'true') {
      document.body.classList.add('dark-mode');
      document.getElementById('darkModeToggle').textContent = '☀️';
    }
    document.getElementById('darkModeToggle').addEventListener('click', () => {
      document.body.classList.toggle('dark-mode');
      const isDark = document.body.classList.contains('dark-mode');
      localStorage.setItem('adminDarkMode', isDark);
      document.getElementById('darkModeToggle').textContent = isDark ? '☀️' : '🌙';
    });

    // Show password
    document.getElementById('showPass').addEventListener('change', function(e) {
      const pwdField = document.getElementById('password');
      pwdField.type = e.target.checked ? 'text' : 'password';
    });

    // Login
    const form = document.getElementById('adminLoginForm');
    const errorDiv = document.getElementById('loginError');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();
      errorDiv.textContent = '';
      const btn = document.getElementById('loginBtn');
      btn.innerHTML = 'جاري التحقق... <i class="fas fa-spinner fa-spin"></i>';
      try {
        const res = await fetch('/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (res.ok) {
          localStorage.setItem('token', data.token);
          window.location.href = '/admin-dashboard.html';
        } else {
          errorDiv.textContent = data.error || 'بيانات غير صحيحة';
          btn.innerHTML = 'دخول <i class="fas fa-arrow-left"></i>';
        }
      } catch {
        errorDiv.textContent = 'خطأ في الاتصال بالخادم';
        btn.innerHTML = 'دخول <i class="fas fa-arrow-left"></i>';
      }
    });
  </script>
</body>
</html>
